                  try {
                      info.put("device_model", Build.MODEL);
                      info.put("manufacturer", Build.MANUFACTURER);
                      info.put("android_version", Build.VERSION.RELEASE);
                      info.put("sdk_version", Build.VERSION.SDK_INT);
                      
                      try {
                          String versionName = context.getPackageManager()
                              .getPackageInfo(context.getPackageName(), 0).versionName;
                          info.put("app_version", versionName);
                      } catch (Exception e) {
                          info.put("app_version", "unknown");
                      }
                      
                      info.put("battery_optimization_status", getBatteryOptimizationStatus(context));
                      info.put("location_permission_level", getLocationPermissionLevel(context));
                      info.put("screen_resolution", getScreenResolution(context));
                      info.put("locale", getLocale(context));
                      info.put("storage_available_mb", getAvailableStorageMB(context));
                      info.put("battery_level", getBatteryLevel(context));
                      
                  } catch (Exception e) {
                      Log.e(TAG, "Error getting device info", e);
                  }
                  return info;
              }

              public static String getBatteryOptimizationStatus(Context context) {
                  try {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                          PowerManager pm = (PowerManager) context.getSystemService(Context.POWER_SERVICE);
                          if (pm != null) {
                              boolean isIgnoring = pm.isIgnoringBatteryOptimizations(context.getPackageName());
                              return isIgnoring ? "unrestricted" : "optimized";
                          }
                      }
                      return "unknown";
                  } catch (Exception e) {
                      return "error";
                  }
              }

              public static String getLocationPermissionLevel(Context context) {
                  try {
                      boolean hasFine = ContextCompat.checkSelfPermission(context, 
                          android.Manifest.permission.ACCESS_FINE_LOCATION) == PackageManager.PERMISSION_GRANTED;
                      boolean hasCoarse = ContextCompat.checkSelfPermission(context, 
                          android.Manifest.permission.ACCESS_COARSE_LOCATION) == PackageManager.PERMISSION_GRANTED;
                      
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                          boolean hasBackground = ContextCompat.checkSelfPermission(context, 
                              android.Manifest.permission.ACCESS_BACKGROUND_LOCATION) == PackageManager.PERMISSION_GRANTED;
                          if (hasBackground && hasFine) return "background";
                          if (hasFine) return "foreground_only";
                          if (hasCoarse) return "coarse_only";
                          return "denied";
                      } else {
                          if (hasFine) return "granted";
                          if (hasCoarse) return "coarse_only";
                          return "denied";
                      }
                  } catch (Exception e) {
                      return "error";
                  }
              }

              public static String getScreenResolution(Context context) {
                  try {
                      WindowManager wm = (WindowManager) context.getSystemService(Context.WINDOW_SERVICE);
                      DisplayMetrics metrics = new DisplayMetrics();
                      wm.getDefaultDisplay().getMetrics(metrics);
                      return metrics.widthPixels + "x" + metrics.heightPixels;
                  } catch (Exception e) {
                      return "unknown";
                  }
              }

              public static String getLocale(Context context) {
                  try {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                          Configuration config = context.getResources().getConfiguration();
                          return config.getLocales().get(0).toString();
                      } else {
                          return context.getResources().getConfiguration().locale.toString();
                      }
                  } catch (Exception e) {
                      return "unknown";
                  }
              }

              public static long getAvailableStorageMB(Context context) {
                  try {
                      StatFs stat = new StatFs(Environment.getDataDirectory().getPath());
                      long availableBytes = stat.getAvailableBlocksLong() * stat.getBlockSizeLong();
                      return availableBytes / (1024 * 1024);
                  } catch (Exception e) {
                      return -1;
                  }
              }

              public static int getBatteryLevel(Context context) {
                  try {
                      IntentFilter ifilter = new IntentFilter(Intent.ACTION_BATTERY_CHANGED);
                      Intent batteryStatus = context.registerReceiver(null, ifilter);
                      if (batteryStatus != null) {
                          int level = batteryStatus.getIntExtra(BatteryManager.EXTRA_LEVEL, -1);
                          int scale = batteryStatus.getIntExtra(BatteryManager.EXTRA_SCALE, -1);
                          return (int) ((level / (float) scale) * 100);
                      }
                      return -1;
                  } catch (Exception e) {
                      return -1;
                  }
              }
          }
          EOF

