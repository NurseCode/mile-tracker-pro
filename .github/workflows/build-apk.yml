            - name: Create DeviceIdentification utility for stable device ID
        run: |
          cat > android/app/src/main/java/com/miletrackerpro/app/utils/DeviceIdentification.java << 'EOF'
          package com.miletrackerpro.app.utils;

          import android.content.Context;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.provider.Settings;
          import android.util.Log;

          import java.security.MessageDigest;
          import java.util.UUID;

          public class DeviceIdentification {
              private static final String TAG = "DeviceIdentification";
              private static final String PREFS_NAME = "DeviceIdentificationPrefs";
              private static final String STABLE_DEVICE_ID_KEY = "stable_device_id";
              private static final String USER_ID_KEY = "user_id";

              public static String getStableDeviceId(Context context) {
                  SharedPreferences prefs = context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE);
                  String stableId = prefs.getString(STABLE_DEVICE_ID_KEY, null);

                  if (stableId == null) {
                      stableId = generateStableDeviceId(context);
                      prefs.edit().putString(STABLE_DEVICE_ID_KEY, stableId).apply();
                      Log.d(TAG, "Generated new stable device ID: " + stableId);
                  }

                  return stableId;
              }

              public static String getUserId(Context context) {
                  SharedPreferences prefs = context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE);
                  String userId = prefs.getString(USER_ID_KEY, null);

                  if (userId == null) {
                      userId = generateUserId(context);
                      prefs.edit().putString(USER_ID_KEY, userId).apply();
                      Log.d(TAG, "Generated new user ID: " + userId);
                  }

                  return userId;
              }

              private static String generateStableDeviceId(Context context) {
                  try {
                      // Use Android ID (persists across app installs but not device resets)
                      String androidId = Settings.Secure.getString(context.getContentResolver(), Settings.Secure.ANDROID_ID);

                      // Create a stable identifier using device characteristics
                      String deviceInfo = androidId + "-" + Build.MODEL + "-" + Build.MANUFACTURER;

                      // Hash it to create a consistent device ID
                      MessageDigest digest = MessageDigest.getInstance("SHA-256");
                      byte[] hash = digest.digest(deviceInfo.getBytes());

                      StringBuilder hexString = new StringBuilder();
                      for (byte b : hash) {
                          String hex = Integer.toHexString(0xff & b);
                          if (hex.length() == 1) {
                              hexString.append('0');
                          }
                          hexString.append(hex);
                      }

                      return "device-" + hexString.toString().substring(0, 16);

                  } catch (Exception e) {
                      Log.e(TAG, "Error generating stable device ID", e);
                      // Fallback to random UUID if all else fails
                      return "device-" + UUID.randomUUID().toString().replace("-", "").substring(0, 16);
                  }
              }

              private static String generateUserId(Context context) {
                  try {
                      // Create a user ID that's stable across app installs
                      String androidId = Settings.Secure.getString(context.getContentResolver(), Settings.Secure.ANDROID_ID);
                      String userInfo = androidId + "-user-" + Build.MODEL;

                      MessageDigest digest = MessageDigest.getInstance("SHA-256");
                      byte[] hash = digest.digest(userInfo.getBytes());

                      StringBuilder hexString = new StringBuilder();
                      for (byte b : hash) {
                          String hex = Integer.toHexString(0xff & b);
                          if (hex.length() == 1) {
                              hexString.append('0');
                          }
                          hexString.append(hex);
                      }

                      return "user-" + hexString.toString().substring(0, 12);

                  } catch (Exception e) {
                      Log.e(TAG, "Error generating user ID", e);
                      return "user-" + UUID.randomUUID().toString().replace("-", "").substring(0, 12);
                  }
              }
          }
          EOF

      - name: Create DeviceInfoHelper for device analytics
        run: |
          cat > android/app/src/main/java/com/miletrackerpro/app/utils/DeviceInfoHelper.java << 'EOF'
          package com.miletrackerpro.app.utils;

          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.content.pm.PackageManager;
          import android.content.res.Configuration;
          import android.os.BatteryManager;
          import android.os.Build;
          import android.os.Environment;
          import android.os.PowerManager;
          import android.os.StatFs;
          import android.util.DisplayMetrics;
          import android.util.Log;
          import android.view.WindowManager;
          import androidx.core.content.ContextCompat;
          import org.json.JSONObject;

          public class DeviceInfoHelper {
              private static final String TAG = "DeviceInfoHelper";

              public static JSONObject getDeviceInfo(Context context) {
                  JSONObject info = new JSONObject();
                  try {
                      info.put("device_model", Build.MODEL);
                      info.put("manufacturer", Build.MANUFACTURER);
                      info.put("android_version", Build.VERSION.RELEASE);
                      info.put("sdk_version", Build.VERSION.SDK_INT);
                      
                      try {
                          String versionName = context.getPackageManager()
                              .getPackageInfo(context.getPackageName(), 0).versionName;
                          info.put("app_version", versionName);
                      } catch (Exception e) {
                          info.put("app_version", "unknown");
                      }
                      
                      info.put("battery_optimization_status", getBatteryOptimizationStatus(context));
                      info.put("location_permission_level", getLocationPermissionLevel(context));
                      info.put("screen_resolution", getScreenResolution(context));
                      info.put("locale", getLocale(context));
                      info.put("storage_available_mb", getAvailableStorageMB(context));
                      info.put("battery_level", getBatteryLevel(context));
                      
                  } catch (Exception e) {
                      Log.e(TAG, "Error getting device info", e);
                  }
                  return info;
              }

              public static String getBatteryOptimizationStatus(Context context) {
                  try {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                          PowerManager pm = (PowerManager) context.getSystemService(Context.POWER_SERVICE);
                          if (pm != null) {
                              boolean isIgnoring = pm.isIgnoringBatteryOptimizations(context.getPackageName());
                              return isIgnoring ? "unrestricted" : "optimized";
                          }
                      }
                      return "unknown";
                  } catch (Exception e) {
                      return "error";
                  }
              }

              public static String getLocationPermissionLevel(Context context) {
                  try {
                      boolean hasFine = ContextCompat.checkSelfPermission(context, 
                          android.Manifest.permission.ACCESS_FINE_LOCATION) == PackageManager.PERMISSION_GRANTED;
                      boolean hasCoarse = ContextCompat.checkSelfPermission(context, 
                          android.Manifest.permission.ACCESS_COARSE_LOCATION) == PackageManager.PERMISSION_GRANTED;
                      
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                          boolean hasBackground = ContextCompat.checkSelfPermission(context, 
                              android.Manifest.permission.ACCESS_BACKGROUND_LOCATION) == PackageManager.PERMISSION_GRANTED;
                          if (hasBackground && hasFine) return "background";
                          if (hasFine) return "foreground_only";
                          if (hasCoarse) return "coarse_only";
                          return "denied";
                      } else {
                          if (hasFine) return "granted";
                          if (hasCoarse) return "coarse_only";
                          return "denied";
                      }
                  } catch (Exception e) {
                      return "error";
                  }
              }

              public static String getScreenResolution(Context context) {
                  try {
                      WindowManager wm = (WindowManager) context.getSystemService(Context.WINDOW_SERVICE);
                      DisplayMetrics metrics = new DisplayMetrics();
                      wm.getDefaultDisplay().getMetrics(metrics);
                      return metrics.widthPixels + "x" + metrics.heightPixels;
                  } catch (Exception e) {
                      return "unknown";
                  }
              }

              public static String getLocale(Context context) {
                  try {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                          Configuration config = context.getResources().getConfiguration();
                          return config.getLocales().get(0).toString();
                      } else {
                          return context.getResources().getConfiguration().locale.toString();
                      }
                  } catch (Exception e) {
                      return "unknown";
                  }
              }

              public static long getAvailableStorageMB(Context context) {
                  try {
                      StatFs stat = new StatFs(Environment.getDataDirectory().getPath());
                      long availableBytes = stat.getAvailableBlocksLong() * stat.getBlockSizeLong();
                      return availableBytes / (1024 * 1024);
                  } catch (Exception e) {
                      return -1;
                  }
              }

              public static int getBatteryLevel(Context context) {
                  try {
                      IntentFilter ifilter = new IntentFilter(Intent.ACTION_BATTERY_CHANGED);
                      Intent batteryStatus = context.registerReceiver(null, ifilter);
                      if (batteryStatus != null) {
                          int level = batteryStatus.getIntExtra(BatteryManager.EXTRA_LEVEL, -1);
                          int scale = batteryStatus.getIntExtra(BatteryManager.EXTRA_SCALE, -1);
                          return (int) ((level / (float) scale) * 100);
                      }
                      return -1;
                  } catch (Exception e) {
                      return -1;
                  }
              }
          }
          EOF

      - name: Create EventTracker for analytics with device info
        run: |
          cat > android/app/src/main/java/com/miletrackerpro/app/utils/EventTracker.java << 'EOF'
          package com.miletrackerpro.app.utils;

          import android.content.Context;
          import android.util.Log;
          import org.json.JSONObject;
          import java.io.OutputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.nio.charset.StandardCharsets;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;

          public class EventTracker {
              private static final String TAG = "EventTracker";
              private static final String API_BASE_URL = "https://mileage-tracker-codenurse.replit.app";
              private static final ExecutorService executor = Executors.newSingleThreadExecutor();
              private static final String PREFS_NAME = "event_tracker_prefs";
              private static long sessionStartTime = 0;

              public static void trackEvent(Context context, String eventType) {
                  trackEvent(context, eventType, null, null);
              }

              public static void trackEvent(Context context, String eventType, String eventData) {
                  trackEvent(context, eventType, eventData, null);
              }

              public static void trackEvent(Context context, String eventType, String eventData, String userEmail) {
                  executor.execute(() -> {
                      try {
                          String deviceId = DeviceIdentification.getStableDeviceId(context);
                          JSONObject deviceInfo = DeviceInfoHelper.getDeviceInfo(context);

                          JSONObject payload = new JSONObject();
                          payload.put("device_id", deviceId);
                          payload.put("event_type", eventType);
                          if (eventData != null) payload.put("event_data", eventData);
                          if (userEmail != null) payload.put("user_email", userEmail);

                          payload.put("device_model", deviceInfo.optString("device_model", null));
                          payload.put("manufacturer", deviceInfo.optString("manufacturer", null));
                          payload.put("android_version", deviceInfo.optString("android_version", null));
                          payload.put("app_version", deviceInfo.optString("app_version", null));
                          payload.put("battery_optimization_status", deviceInfo.optString("battery_optimization_status", null));
                          payload.put("location_permission_level", deviceInfo.optString("location_permission_level", null));
                          payload.put("screen_resolution", deviceInfo.optString("screen_resolution", null));
                          payload.put("locale", deviceInfo.optString("locale", null));
                          payload.put("storage_available_mb", deviceInfo.optInt("storage_available_mb", -1));

                          if (sessionStartTime > 0) {
                              long sessionDuration = (System.currentTimeMillis() - sessionStartTime) / 1000;
                              payload.put("session_duration_seconds", sessionDuration);
                          }

                          URL url = new URL(API_BASE_URL + "/api/events");
                          HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                          conn.setRequestMethod("POST");
                          conn.setRequestProperty("Content-Type", "application/json");
                          conn.setDoOutput(true);
                          conn.setConnectTimeout(10000);
                          conn.setReadTimeout(10000);

                          try (OutputStream os = conn.getOutputStream()) {
                              byte[] input = payload.toString().getBytes(StandardCharsets.UTF_8);
                              os.write(input, 0, input.length);
                          }

                          int responseCode = conn.getResponseCode();
                          Log.d(TAG, "Event tracked: " + eventType + " - Response: " + responseCode);
                          conn.disconnect();
                      } catch (Exception e) {
                          Log.e(TAG, "Error tracking event: " + eventType, e);
                      }
                  });
              }

              // ===== SESSION TRACKING =====
              public static void trackAppOpen(Context context) {
                  sessionStartTime = System.currentTimeMillis();
                  android.content.SharedPreferences prefs = context.getSharedPreferences(PREFS_NAME, Context.MODE_PRIVATE);
                  boolean isFirstOpen = !prefs.getBoolean("has_opened_before", false);
                  if (isFirstOpen) {
                      prefs.edit().putBoolean("has_opened_before", true).apply();
                      trackEvent(context, "first_open", java.util.Locale.getDefault().toString());
                  }
                  int openCount = prefs.getInt("open_count", 0) + 1;
                  prefs.edit().putInt("open_count", openCount).apply();
                  trackEvent(context, "app_open", String.valueOf(openCount));
              }

              public static void trackAppBackground(Context context) {
                  long duration = 0;
                  if (sessionStartTime > 0) {
                      duration = (System.currentTimeMillis() - sessionStartTime) / 1000;
                  }
                  trackEvent(context, "app_background", String.valueOf(duration));
              }

              // ===== AUTH FUNNEL =====
              public static void trackSignupStarted(Context context) {
                  trackEvent(context, "signup_started");
              }

              public static void trackSignupSuccess(Context context, String email) {
                  trackEvent(context, "signup_success", null, email);
              }

              public static void trackSignupFailed(Context context, String reason) {
                  trackEvent(context, "signup_failed", reason);
              }

              public static void trackLoginStarted(Context context) {
                  trackEvent(context, "login_started");
              }

              public static void trackLoginSuccess(Context context, String email) {
                  trackEvent(context, "login_success", null, email);
              }

              public static void trackLoginFailed(Context context, String reason) {
                  trackEvent(context, "login_failed", reason);
              }

              public static void trackGuestModeStarted(Context context) {
                  trackEvent(context, "guest_mode_started");
              }

              // ===== TRIP LIFECYCLE =====
              public static void trackTripStarted(Context context, String triggerType) {
                  trackEvent(context, "trip_started", triggerType);
              }

              public static void trackTripCompleted(Context context, String tripData) {
                  trackEvent(context, "trip_completed", tripData);
              }

              public static void trackTripSavedLocal(Context context, String tripId) {
                  trackEvent(context, "trip_saved_local", tripId);
              }

              public static void trackTripSyncSuccess(Context context, String tripId) {
                  trackEvent(context, "trip_sync_success", tripId);
              }

              public static void trackTripSyncFailed(Context context, String reason) {
                  trackEvent(context, "trip_sync_failed", reason);
              }

              public static void trackTripCategorized(Context context, String category) {
                  trackEvent(context, "trip_categorized", category);
              }

              public static void trackTripExported(Context context, String format) {
                  trackEvent(context, "trip_exported", format);
              }

              // ===== PERMISSIONS =====
              public static void trackPermissionRequested(Context context, String permission) {
                  trackEvent(context, "permission_requested", permission);
              }

              public static void trackPermissionGranted(Context context, String permission) {
                  trackEvent(context, "permission_granted", permission);
              }

              public static void trackPermissionDenied(Context context, String permission) {
                  trackEvent(context, "permission_denied", permission);
              }

              // ===== FEATURE USAGE =====
              public static void trackTabViewed(Context context, String tabName) {
                  trackEvent(context, "tab_viewed", tabName);
              }

              public static void trackFeatureUsed(Context context, String featureName) {
                  trackEvent(context, "feature_used", featureName);
              }

              public static void trackSettingsChanged(Context context, String settingName) {
                  trackEvent(context, "settings_changed", settingName);
              }

              // ===== UPGRADE / MONETIZATION =====
              public static void trackUpgradeDialogViewed(Context context) {
                  trackEvent(context, "upgrade_dialog_viewed");
              }

              public static void trackUpgradeDialogConverted(Context context, String productId) {
                  trackEvent(context, "upgrade_dialog_converted", productId);
              }

              public static void trackUpgradeDialogDismissed(Context context) {
                  trackEvent(context, "upgrade_dialog_dismissed");
              }

              public static void trackPromoCodeEntered(Context context, String code) {
                  trackEvent(context, "promo_code_entered", code);
              }

              // ===== ERRORS =====
              public static void trackError(Context context, String errorType, String errorMessage) {
                  String errorData = errorType + ": " + (errorMessage != null ? errorMessage.substring(0, Math.min(errorMessage.length(), 200)) : "unknown");
                  trackEvent(context, "app_error", errorData);
              }

              public static void trackSyncError(Context context, String errorMessage) {
                  trackError(context, "sync_error", errorMessage);
              }

              // ===== AUTO DETECTION =====
              public static void trackAutoDetectionEnabled(Context context, boolean enabled) {
                  trackEvent(context, "auto_detection_toggled", enabled ? "enabled" : "disabled");
              }

              public static void trackBluetoothVehicleConnected(Context context, String vehicleName) {
                  trackEvent(context, "bluetooth_vehicle_connected", vehicleName);
              }
          }
